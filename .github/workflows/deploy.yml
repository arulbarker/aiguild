name: Deploy ke VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy ke VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.77.122.42
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: bash /data/deploy-aiguild.sh
