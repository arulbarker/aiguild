name: Deploy ke VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy ke VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.77.122.42
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            bash /data/deploy-aiguild.sh
            echo "=== Sinkronisasi modul (seed aman, progress user dipertahankan) ==="
            cd /data/aiguild
            docker run --rm \
              --network aiguild-net \
              --env-file /data/aiguild/.env.production \
              -v /data/aiguild:/app -w /app \
              node:20-alpine \
              sh -c "apk add --no-cache openssl && npm ci && npx prisma generate && npm run seed"
